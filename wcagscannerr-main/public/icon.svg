  <line x1="180" y1="240" x2="332" y2="240" stroke="#7c3aed" stroke-width="3" opacity="0.6"/>
  <line x1="180" y1="280" x2="332" y2="280" stroke="#7c3aed" stroke-width="3" opacity="0.6"/>
  <!-- Checkmark -->
  <path d="M210 250 L245 285 L310 200" fill="none" stroke="#7c3aed" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- WCAG text -->
  <text x="256" y="155" text-anchor="middle" fill="#7c3aed" font-family="system-ui, sans-serif" font-size="42" font-weight="800" letter-spacing="2">WCAG</text>
