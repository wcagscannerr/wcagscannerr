  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Shield shape -->
  <path d="M256 80 L380 140 L380 280 C380 360 256 432 256 432 C256 432 132 360 132 280 L132 140 Z" fill="url(#shield)" opacity="0.95"/>
