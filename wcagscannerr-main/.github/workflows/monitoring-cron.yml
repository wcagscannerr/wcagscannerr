name: Monitoring & Regression Alerts

# Ticks the monitoring endpoint, which processes ONE due site per call
# (see app/api/cron/run-monitoring/route.ts) — same pattern as the batch
# queue processor. Runs every 15 minutes so that if several sites are due
# around the same time, they clear out over the next hour instead of one
# per hour.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab to test

jobs:
  run-monitoring:
    runs-on: ubuntu-latest
    steps:
      - name: Hit the monitoring endpoint
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 90 \
            -X GET "https://www.wcagscannerr.com/api/cron/run-monitoring" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Response: $BODY"

          if [ "$CODE" != "200" ]; then
            echo "❌ Monitoring check failed (HTTP $CODE)"
            exit 1
          fi

          echo "✅ Monitoring check complete"
